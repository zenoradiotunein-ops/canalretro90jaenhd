<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Canal Retro 90 Jaén HD</title>
    <!-- Librería HLS.js para reproducir M3U8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Contenedor principal adaptado */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #00e5ff;
            box-shadow: inset 0 0 15px #00e5ff;
        }

        /* Vídeo entero sin recortes */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        /* Indicador HD reubicado abajo a la izquierda para no tapar el logo */
        .hd-badge {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #00e5ff;
            border: 1px solid #00e5ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 4;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            text-transform: uppercase;
        }

        /* Capa del botón de reproducción */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Botón Neón LED Azul */
        .play-btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: 2px solid #00e5ff;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.8);
            cursor: pointer;
            outline: none;
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Indicador HD limpio abajo a la izquierda -->
    <div class="hd-badge">HD</div>

    <div class="video-container">
        <video id="bgVideo" playsinline muted preload="auto"></video>
    </div>

    <div class="overlay" id="overlay">
        <button class="play-btn" id="playBtn">▶️ REPRODUCIR DIRECTO</button>
    </div>

    <script>
        const m3u8Url = 'https://6641e38ac34c3.streamlock.net:1936/radioporcuna/radioporcuna/playlist.m3u8';

        const video = document.getElementById('bgVideo');
        const playBtn = document.getElementById('playBtn');
        const overlay = document.getElementById('overlay');

        if (Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true
            });
            hls.loadSource(m3u8Url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = m3u8Url;
        }

        window.addEventListener('load', () => {
            video.play().then(() => {
                overlay.style.display = 'none';
            }).catch(() => {
                overlay.style.display = 'flex';
            });
        });

        playBtn.addEventListener('click', () => {
            video.muted = false;
            video.play();
            overlay.style.display = 'none';

            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(() => {});
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen().catch(() => {});
            } else if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            }
        });
    </script>
</body>
</html>
