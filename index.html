<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Canal Retro 90 Jaén HD</title>
    <!-- Librería para reproducir M3U8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, Helvetica, sans-serif;
        }

        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Distintivo HD discreto abajo a la izquierda */
        .hd-badge {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 4;
        }

        /* Capa superpuesta oscura */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Botón negro elegante, sin rastros de azul */
        .play-btn {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            outline: none;
            z-index: 5;
            transition: background-color 0.2s, transform 0.2s;
        }

        .play-btn:hover {
            background-color: #222;
        }

        .play-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <!-- Distintivo HD -->
    <div class="hd-badge">HD</div>

    <div class="video-container">
        <video id="bgVideo" playsinline preload="auto"></video>
    </div>

    <div class="overlay" id="overlay">
        <button class="play-btn" id="playBtn">▶️ Reproducir</button>
    </div>

    <script>
        const m3u8Url = 'https://6641e38ac34c3.streamlock.net:1936/radioporcuna/radioporcuna/playlist.m3u8';

        const video = document.getElementById('bgVideo');
        const playBtn = document.getElementById('playBtn');
        const overlay = document.getElementById('overlay');

        if (Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true
            });
            hls.loadSource(m3u8Url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = m3u8Url;
        }

        playBtn.addEventListener('click', () => {
            video.muted = false;
            video.volume = 1.0;
            
            video.play().then(() => {
                overlay.style.display = 'none';
            }).catch(error => {
                console.log("Error al reproducir:", error);
            });

            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(() => {});
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen().catch(() => {});
            } else if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            }
        });
    </script>
</body>
</html>
