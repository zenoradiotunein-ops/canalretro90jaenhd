<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canal Retro 90 Jaén HD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .play-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.6);
            cursor: pointer;
            outline: none;
            z-index: 3;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .play-btn:active {
            transform: scale(0.95);
        }
        .hd-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #00e5ff;
            border: 1px solid #00e5ff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 3;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="hd-badge">HD 1080</div>

    <div class="video-container">
        <!-- El atributo playsinline y muted permiten arranque instantáneo y suave en móviles -->
        <video id="bgVideo" loop playsinline muted preload="auto">
            <source src="TU_ENLACE_DE_VIDEO.mp4" type="video/mp4">
            Tu navegador no soporta vídeo HTML5.
        </video>
    </div>

    <!-- Capa del botón de Play -->
    <div class="overlay" id="overlay">
        <button class="play-btn" id="playBtn">▶️ REPRODUCIR</button>
    </div>

    <!-- Audio del Stream -->
    <audio id="audioStream" preload="none">
        <source src="TU_ENLACE_DE_STREAM_AUDIO" type="audio/mpeg">
    </audio>

    <script>
        const video = document.getElementById('bgVideo');
        const audio = document.getElementById('audioStream');
        const playBtn = document.getElementById('playBtn');
        const overlay = document.getElementById('overlay');

        // Intento de arranque automático (para ordenadores)
        window.addEventListener('load', () => {
            let promise = video.play();
            if (promise !== undefined) {
                promise.then(() => {
                    // Si el navegador permite autoplay, intentamos cargar audio
                    audio.play().then(() => {
                        overlay.style.display = 'none';
                    }).catch(() => {
                        // Si el móvil bloquea el audio con autoplay, mostramos botón
                        overlay.style.display = 'flex';
                    });
                }).catch(() => {
                    overlay.style.display = 'flex';
                });
            }
        });

        // Pulsación manual (para móviles)
        playBtn.addEventListener('click', () => {
            video.muted = false; // Desbloquea sonido en móvil
            video.play();
            audio.play();
            overlay.style.display = 'none'; // Oculta el botón
        });
    </script>
</body>
</html>
