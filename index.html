<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Canal Retro 90 Jaén HD</title>
    <!-- Librería para reproducir M3U8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor en formato 16:9 estricto */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 768px) {
            .video-container {
                width: 100%;
                height: auto;
            }
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        /* Distintivo HD abajo a la izquierda */
        .hd-badge {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 4;
            pointer-events: none;
        }

        /* Capa inicial */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        /* Botón de reproducción negro puro y elegante */
        .play-btn {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background-color: #000000;
            border: 2px solid #333333;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            outline: none;
            transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
        }

        .play-btn:hover {
            background-color: #1a1a1a;
            border-color: #555555;
        }

        .play-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Distintivo HD -->
        <div class="hd-badge">HD</div>

        <!-- Vídeo con controles nativos -->
        <video id="bgVideo" playsinline controls preload="auto"></video>

        <!-- Capa y botón negro inicial -->
        <div class="overlay" id="overlay">
            <button class="play-btn" id="playBtn">▶️ Reproducir</button>
        </div>
    </div>

    <script>
        const m3u8Url = 'https://6641e38ac34c3.streamlock.net:1936/radioporcuna/radioporcuna/playlist.m3u8';

        const video = document.getElementById('bgVideo');
        const playBtn = document.getElementById('playBtn');
        const overlay = document.getElementById('overlay');

        function iniciarReproduccion() {
            video.muted = false;
            video.volume = 1.0;
            video.play().then(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 300);
            }).catch(error => {
                console.log("Reproducción automática bloqueada por el navegador:", error);
            });
        }

        if (Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true
            });
            hls.loadSource(m3u8Url);
            hls.attachMedia(video);
            
            // Intenta reproducir automáticamente en cuanto HLS esté listo
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                iniciarReproduccion();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = m3u8Url;
            video.addEventListener('loadedmetadata', () => {
                iniciarReproduccion();
            });
        }

        // Por si el navegador bloquea el auto-play, el botón negro sigue ahí para arrancar al toque
        playBtn.addEventListener('click', iniciarReproduccion);
    </script>
</body>
</html>
