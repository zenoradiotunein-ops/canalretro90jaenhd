<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal Retro 90 Jaén HD</title>

    <!-- Hojas de estilo y librería Video.js -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor adaptativo 16:9 */
        .video-container {
            width: 100vw;
            max-width: 100vh;
            aspect-ratio: 16 / 9;
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* Estilos personalizados para las barras azules retro y el HD */
        .vjs-matrix .vjs-control-bar {
            background-color: rgba(10, 15, 25, 0.85) !important;
        }

        /* Barras de volumen y progreso en azul neón */
        .vjs-matrix .vjs-play-progress, 
        .vjs-matrix .vjs-volume-level {
            background-color: #00a8ff !important;
            box-shadow: 0 0 8px #00a8ff;
        }

        /* Chapa HD en los controles */
        .hd-badge {
            color: #00a8ff;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            border: 1px solid #00a8ff;
            border-radius: 3px;
            height: 20px;
            margin-top: 5px;
            margin-right: 5px;
            text-shadow: 0 0 5px #00a8ff;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="videoPlayer" class="video-js vjs-default-skin vjs-matrix vjs-big-play-centered" controls playsinline preload="auto">
        </video>
    </div>

    <script>
        const videoElement = document.getElementById('videoPlayer');
        const streamUrl = 'https://6641e38ac34c3.streamlock.net:1936/radioporcuna/radioporcuna/playlist.m3u8';

        // Inicialización de Video.js
        const player = videojs('videoPlayer', {
            autoplay: true,
            controls: true,
            responsive: true,
            muted: false,
            volume: 1.0
        });

        // Insertar el botón HD
        player.ready(function() {
            const controlBar = player.controlBar.el();
            const hdButton = document.createElement('div');
            hdButton.className = 'hd-badge vjs-control';
            hdButton.innerHTML = 'HD';
            
            const fullscreenToggle = player.controlBar.fullscreenToggle.el();
            controlBar.insertBefore(hdButton, fullscreenToggle);
        });

        // Carga de señal HLS
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                player.play().catch(e => console.log("Autoplay bloqueado:", e));
            });
        } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            videoElement.src = streamUrl;
            videoElement.addEventListener('loadedmetadata', function() {
                player.play().catch(e => console.log("Autoplay en iOS:", e));
            });
        }
    </script>
</body>
</html>
